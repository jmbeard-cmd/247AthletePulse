<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>247 Athlete Pulse</title>
    <meta http-equiv="content-security-policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; frame-src 'self' https:; font-src 'self' https://esm.sh https://fonts.gstatic.com; base-uri 'self'; manifest-src 'self'; connect-src 'self' blob: https: wss:; img-src 'self' data: blob: https:; media-src 'self' https:">
    <link rel="manifest" href="/manifest.webmanifest">
    <!-- CSS custom properties loaded immediately as plain CSS — not dependent on Tailwind CDN -->
    <style>
      :root {
        --background: 0 0% 100%;
        --foreground: 222 47% 11%;
        --card: 0 0% 100%;
        --card-foreground: 222 47% 11%;
        --popover: 0 0% 100%;
        --popover-foreground: 222 47% 11%;
        --primary: 224 71% 47%;
        --primary-foreground: 0 0% 100%;
        --secondary: 210 40% 96%;
        --secondary-foreground: 222 47% 11%;
        --muted: 210 40% 96%;
        --muted-foreground: 215 16% 47%;
        --accent: 38 92% 50%;
        --accent-foreground: 0 0% 100%;
        --destructive: 0 84% 60%;
        --destructive-foreground: 0 0% 100%;
        --border: 214 32% 91%;
        --input: 214 32% 91%;
        --ring: 224 71% 47%;
        --radius: 0.75rem;
        --sidebar-background: 0 0% 100%;
        --sidebar-foreground: 222 47% 11%;
        --sidebar-primary: 224 71% 47%;
        --sidebar-primary-foreground: 0 0% 100%;
        --sidebar-accent: 210 40% 96%;
        --sidebar-accent-foreground: 222 47% 11%;
        --sidebar-border: 214 32% 91%;
        --sidebar-ring: 224 71% 47%;
      }
      .dark {
        --background: 222 47% 11%;
        --foreground: 210 40% 98%;
        --card: 222 47% 11%;
        --card-foreground: 210 40% 98%;
        --popover: 222 47% 11%;
        --popover-foreground: 210 40% 98%;
        --primary: 224 71% 60%;
        --primary-foreground: 0 0% 100%;
        --secondary: 217 33% 17%;
        --secondary-foreground: 210 40% 98%;
        --muted: 217 33% 17%;
        --muted-foreground: 215 20% 65%;
        --accent: 38 92% 50%;
        --accent-foreground: 0 0% 100%;
        --destructive: 0 63% 31%;
        --destructive-foreground: 210 40% 98%;
        --border: 217 33% 17%;
        --input: 217 33% 17%;
        --ring: 224 71% 60%;
        --sidebar-background: 222 47% 8%;
        --sidebar-foreground: 210 40% 98%;
        --sidebar-primary: 224 71% 60%;
        --sidebar-primary-foreground: 0 0% 100%;
        --sidebar-accent: 217 33% 17%;
        --sidebar-accent-foreground: 210 40% 98%;
        --sidebar-border: 217 33% 17%;
        --sidebar-ring: 224 71% 60%;
      }
      * { box-sizing: border-box; border-color: hsl(var(--border)); }
      body { background-color: hsl(var(--background)); color: hsl(var(--foreground)); margin: 0; font-family: 'Inter Variable', 'Inter', system-ui, sans-serif; }
      h1,h2,h3,h4,h5,h6 { font-family: 'Outfit Variable', 'Outfit', system-ui, sans-serif; }
      .font-outfit { font-family: 'Outfit Variable', 'Outfit', system-ui, sans-serif; }
      .font-inter  { font-family: 'Inter Variable', 'Inter', system-ui, sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
